<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAPHOM | Member Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

        .modal { display: none; position: fixed; inset: 0; }
        .modal.active {
            display: flex !important;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>

<body class="bg-white">

<!-- NAV -->
<nav class="p-6 flex justify-between">
    <div>BAPHOM</div>
    <button id="userBtn">Account</button>
</nav>

<!-- MODAL -->
<div id="authModal" class="modal">
    <div class="bg-white p-8 w-full max-w-sm relative">
        <button onclick="toggleAuth()" class="absolute right-4 top-4">X</button>

        <div id="loginForm">
            <h2>Login</h2>
            <input id="loginEmail" placeholder="Email"><br>
            <input id="loginPass" type="password" placeholder="Senha"><br>
            <button onclick="handleLogin()">Entrar</button>
            <p><button onclick="switchAuth()">Criar conta</button></p>
        </div>

        <div id="registerForm" style="display:none;">
            <h2>Criar Conta</h2>
            <input id="regEmail" placeholder="Email"><br>
            <input id="regPass" type="password" placeholder="Senha"><br>
            <button onclick="handleRegister()">Criar</button>
            <p><button onclick="switchAuth()">Login</button></p>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 SUA CONFIG CORRETA
const firebaseConfig = {
  apiKey: "AIzaSyCfQR5oGS4oBAo8n2KHynFOxgUlnZvmwHM",
  authDomain: "baphom-d0d13.firebaseapp.com",
  projectId: "baphom-d0d13",
  storageBucket: "baphom-d0d13.firebasestorage.app",
  messagingSenderId: "404007926967",
  appId: "1:404007926967:web:64bf534913a0af153ba132",
  measurementId: "G-3B06HYF62Z"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// UI
window.toggleAuth = () => {
    document.getElementById('authModal').classList.toggle('active');
};

window.switchAuth = () => {
    const login = document.getElementById('loginForm');
    const reg = document.getElementById('registerForm');

    login.style.display = login.style.display === "none" ? "block" : "none";
    reg.style.display = reg.style.display === "none" ? "block" : "none";
};

// REGISTER
window.handleRegister = async () => {
    const email = regEmail.value;
    const pass = regPass.value;

    try {
        await createUserWithEmailAndPassword(auth, email, pass);
        toggleAuth();
    } catch (err) {
        alert(err.message);
    }
};

// LOGIN
window.handleLogin = async () => {
    const email = loginEmail.value;
    const pass = loginPass.value;

    try {
        await signInWithEmailAndPassword(auth, email, pass);
        toggleAuth();
    } catch (err) {
        alert(err.message);
    }
};

// USER STATE
onAuthStateChanged(auth, (user) => {
    const btn = document.getElementById('userBtn');

    if (user) {
        btn.innerText = user.email;
        btn.onclick = () => signOut(auth);
    } else {
        btn.innerText = "Account";
        btn.onclick = toggleAuth;
    }
});
</script>

</body>
</html>
